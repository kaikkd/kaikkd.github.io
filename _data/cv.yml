    Projects:
      - name: "GCAO: Group-driven Clustering via Gravitational Attraction and Optimization"
        summary: Physics-inspired clustering framework integrating group dynamics and gravitational optimization.
        highlights:
          - Designed group construction strategies and gravitational potential functions.
          - Proved algorithm convergence and implemented a complete Python experimental framework.
          - Evaluated on 11 high-dimensional datasets, improving NMI, ARI, Homogeneity, and ACC by 37.13%, 52.08%, 44.98%, and 38.81% over mainstream baselines.
        start_date: 2024-11-01
        end_date: 2025-11-01

      - name: "FCDNet: Forest Change Detection Network"
        summary: Multi-scale attention network with dual-temporal remote sensing feature comparison.
        highlights:
          - Integrated CBAM with a VGG16 encoder-decoder and a channel switching module.
          - Optimized loss weighting to alleviate class imbalance.
          - Achieved 78.51% IoU on test data, a 2.25% improvement over previous SOTA.
        start_date: 2023-10-01
        end_date: 2024-12-01

      - name: "ForestFoodKG: Structured Dataset and Knowledge Graph"
        summary: Structured dataset and knowledge graph for forest food taxonomy and nutrition.
        highlights:
          - Integrated Flora of China and related sources into a standardized data pipeline.
          - Cleaned text with regular expressions and removed 30% invalid data.
          - Built a MySQL system managing over 50,000 plant entries.
        start_date: 2024-03-01
        end_date: 2024-09-01

      - name: Optimization of UAV LiDAR Forest Volume Estimation Scanning Patterns
        summary: Terrain-aware optimization of scanning path planning for complex forests.
        highlights:
          - Added dynamic weighting with terrain parameters to path planning models.
          - Reached 92% coverage on complex terrains while reducing scan time by 18%.
        start_date: 2024-02-01
        end_date: 2024-12-01

      - name: Multimodal Intelligent Wetland Waterbird Identification and Habitat Monitoring
        summary: Multimodal recognition pipeline combining image and audio modeling.
        highlights:
          - Built image and audio models with EfficientNet-B0, ResNeSt50-fast, PyTorch, MySQL, and Flask.
          - Achieved 89.7% accuracy (F1-score) on multimodal waterbird identification.
          - Won national first prize and provincial second prize in related competitions.
        start_date: 2023-09-01
        end_date: 2024-06-01

      - name: Forestry Knowledge Q&A Model based on Qwen1.5 and LoRA
        summary: Domain adaptation for forestry Q&A with lightweight fine-tuning.
        highlights:
          - Built a 400-sample QA dataset and fine-tuned Qwen1.5 with LoRA.
          - Added quantized loading, real-time loss monitoring, TensorBoard, and Gradio streaming Q&A.
          - Achieved 88% F1-score on domain tests.
        start_date: 2025-08-01
        end_date: 2025-09-01

      - name: Locally Deployed RAG Multi-Model Medical Q&A System
        summary: Local end-to-end RAG stack with flexible model switching and quality evaluation.
        highlights:
          - Integrated LangChain, FAISS retrieval, BGE embedding, reranker, Qwen3, and LLaMA3.
          - Built a Streamlit UI with streaming output, context display, and latency metrics.
          - Added BERTScore and recall for automatic QA evaluation.
        start_date: 2025-08-01
        end_date: 2025-09-01

      - name: Website Development about Artificial Intelligence Introduction
        summary: Responsive AI science-pop website with interactive frontend components.
        highlights:
